name: Trading signals (cloud)

on:
  schedule:
    # Gio UTC (VN = UTC+7). Chi chay 09:00 -> 00:00 gio VN cho tiet kiem API.
    - cron: "*/30 2-16 * * *"   # 09:00 - 23:30 VN, moi 30 phut
    - cron: "0 17 * * *"        # 00:00 VN (nen dong cuoi trong ngay)
  workflow_dispatch:
    inputs:
      test_mail:
        description: "Gui 1 mail THU de kiem tra (khong quet tin hieu)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: trading-signals
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      NOTIFIER_CHANNEL: email
      FORCE_TEST_MAIL: ${{ inputs.test_mail }}
      # Danh sach da chot: XAU (breakout, M30+H1) + FX trend (M30)
      SYMBOLS_GOLD_CRYPTO: XAUUSD
      TIMEFRAMES_GOLD_CRYPTO: M30,H1
      SYMBOLS_FOREX: EURUSD,USDJPY,NZDUSD
      TIMEFRAMES_FOREX: M30
      MIN_CONFIDENCE: "60"
      ENTRY_MODE: limit
      USE_MTF: "1"
      CANDLE_COUNT: "250"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cai thu vien
        run: pip install -r requirements-cloud.txt
      - name: Quet tin hieu + gui mail
        run: python run_cloud.py
      - name: Luu trang thai (chong gui trung)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud_state.json || true
          git diff --staged --quiet || git commit -m "update signal state [skip ci]"
          git push || true
